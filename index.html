<script>
  // Prevents theme flicker by applying the theme from localStorage or system preference before the page loads.
  if (localStorage.getItem('app-theme') === 'dark' || (!('app-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
</script>
